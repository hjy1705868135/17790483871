<!-- 
 * 无人机信息管理系统 - 前端入口页面
 * 技术栈：Vue3 + Vite + Bootstrap4
 * 此文件是HTML模板，作为Vue应用的挂载点
 -->
<!DOCTYPE html>
<!-- 声明文档类型为HTML5 -->
<html lang="zh-CN">
<!-- HTML根标签，设置语言为中文 -->
<head>
    <!-- 设置字符编码为UTF-8，支持中文显示 -->
    <meta charset="UTF-8">
    <!-- 设置视口，确保移动端适配：宽度=device-width，初始缩放=1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题，显示在浏览器标签上 -->
    <title>无人机信息管理系统</title>
    <!-- 引入Bootstrap4 CSS框架，用于基础样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
</head>
<body>
    <!-- Vue应用挂载点：Vue实例会将模板渲染到这个div中 -->
    <div id="app"></div>
    <!-- 引入Vue应用入口脚本，type="module"表示使用ES模块语法 -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
