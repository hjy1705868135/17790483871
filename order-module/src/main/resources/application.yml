server:
  port: 8080

spring:
  application:
    name: order-module
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false

knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: 电商平台订单模块接口文档
    description: 提供完整的订单CRUD操作接口
    version: 1.0.0
    contact:
      name: API Support
      email: support@example.com

logging:
  level:
    com.example.order: DEBUG
    com.baomidou.mybatisplus: DEBUG
