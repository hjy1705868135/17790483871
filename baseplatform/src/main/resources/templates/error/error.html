<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">错误</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.3.7/css/bootstrap.min.css}"/>
</head>
<body>
<div class="container" style="max-width: 640px; margin-top: 48px;">
    <div class="panel panel-danger">
        <div class="panel-heading" th:text="${title}">错误</div>
        <div class="panel-body">
            <p th:text="${message}">说明</p>
            <a class="btn btn-default" th:href="@{/uav}">返回列表</a>
            <a class="btn btn-link" th:href="@{/login}">重新登录</a>
        </div>
    </div>
</div>
</body>
</html>
