<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>登录 — 无人机管理</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.3.7/css/bootstrap.min.css}"/>
</head>
<body>
<div class="container" style="max-width: 420px; margin-top: 80px;">
    <h3 class="text-center">无人机管理系统</h3>
    <p class="text-muted text-center">默认账号 <code>admin</code> / <code>admin123</code></p>
    <div class="panel panel-default">
        <div class="panel-heading">登录</div>
        <div class="panel-body">
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">错误</div>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input id="username" name="username" class="form-control" autocomplete="username" required="required"/>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input id="password" name="password" type="password" class="form-control" autocomplete="current-password"
                           required="required"/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/webjars/jquery/1.12.4/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/3.3.7/js/bootstrap.min.js}"></script>
</body>
</html>
