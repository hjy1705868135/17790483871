<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>无人机列表</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.3.7/css/bootstrap.min.css}"/>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container-fluid">
        <div class="navbar-header">
            <span class="navbar-brand">无人机管理</span>
        </div>
        <p class="navbar-text navbar-right" style="margin-right: 15px;">
            <span th:if="${loginName}" th:text="'用户：' + ${loginName}">用户</span>
            <a class="btn btn-link btn-sm" th:href="@{/logout}">退出</a>
        </p>
    </div>
</nav>

<div class="container-fluid">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="panel panel-default">
        <div class="panel-heading">查询</div>
        <div class="panel-body">
            <form class="form-inline" th:action="@{/uav}" method="get">
                <div class="form-group">
                    <label class="sr-only" for="keyword">关键字</label>
                    <input id="keyword" name="keyword" class="form-control" placeholder="编号/型号/厂商"
                           th:value="${keyword}"/>
                </div>
                <div class="form-group" style="margin-left: 8px;">
                    <label class="sr-only" for="status">状态</label>
                    <select id="status" name="status" class="form-control">
                        <option value="">全部状态</option>
                        <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
                        <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">INACTIVE</option>
                        <option value="MAINTENANCE" th:selected="${status == 'MAINTENANCE'}">MAINTENANCE</option>
                    </select>
                </div>
                <input type="hidden" name="pageNum" value="1"/>
                <input type="hidden" name="pageSize" th:value="${page.pageSize}"/>
                <button type="submit" class="btn btn-primary" style="margin-left: 8px;">查询</button>
                <a class="btn btn-default" style="margin-left: 8px;" th:href="@{/uav}">重置</a>
                <a class="btn btn-success pull-right" th:href="@{/uav/add}">新增</a>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered table-hover">
            <thead>
            <tr>
                <th>编号</th>
                <th>型号</th>
                <th>厂商</th>
                <th>状态</th>
                <th>更新时间</th>
                <th style="width: 220px;">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${page.records}">
                <td th:text="${u.code}">CODE</td>
                <td th:text="${u.model}">MODEL</td>
                <td th:text="${u.manufacturer}">MFG</td>
                <td th:text="${u.status}">ACTIVE</td>
                <td th:text="${u.updatedAt}">time</td>
                <td>
                    <a class="btn btn-info btn-xs" th:href="@{/uav/detail/{id}(id=${u.id})}">详情</a>
                    <a class="btn btn-warning btn-xs" th:href="@{/uav/edit/{id}(id=${u.id})}">编辑</a>
                    <form style="display:inline;" th:action="@{/uav/remove/{id}(id=${u.id})}" method="post"
                          onsubmit="return confirm('确认删除？');">
                        <button type="submit" class="btn btn-danger btn-xs">删除</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(page.records)}">
                <td colspan="6" class="text-center text-muted">暂无数据</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${page.totalPages > 1}">
        <ul class="pagination">
            <li th:classappend="${page.pageNum <= 1} ? 'disabled'">
                <a th:href="@{/uav(pageNum=${page.pageNum - 1}, pageSize=${page.pageSize}, keyword=${keyword}, status=${status})}"
                   aria-label="Previous"><span aria-hidden="true">&laquo;</span></a>
            </li>
            <li th:each="i : ${#numbers.sequence(1, page.totalPages)}"
                th:classappend="${i == page.pageNum} ? 'active'">
                <a th:href="@{/uav(pageNum=${i}, pageSize=${page.pageSize}, keyword=${keyword}, status=${status})}"
                   th:text="${i}">1</a>
            </li>
            <li th:classappend="${page.pageNum >= page.totalPages} ? 'disabled'">
                <a th:href="@{/uav(pageNum=${page.pageNum + 1}, pageSize=${page.pageSize}, keyword=${keyword}, status=${status})}"
                   aria-label="Next"><span aria-hidden="true">&raquo;</span></a>
            </li>
        </ul>
        <p class="text-muted">
            共 <span th:text="${page.total}">0</span> 条，
            每页 <span th:text="${page.pageSize}">10</span> 条，
            第 <span th:text="${page.pageNum}">1</span> /
            <span th:text="${page.totalPages}">1</span> 页
        </p>
    </nav>
</div>

<script th:src="@{/webjars/jquery/1.12.4/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/3.3.7/js/bootstrap.min.js}"></script>
</body>
</html>
