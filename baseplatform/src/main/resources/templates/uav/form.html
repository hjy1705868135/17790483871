<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${formTitle}">表单</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.3.7/css/bootstrap.min.css}"/>
</head>
<body>
<nav class="navbar navbar-default">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" th:href="@{/uav}">无人机管理</a>
        </div>
        <p class="navbar-text navbar-right" style="margin-right: 15px;">
            <span th:if="${loginName}" th:text="'用户：' + ${loginName}">用户</span>
            <a class="btn btn-link btn-sm" th:href="@{/logout}">退出</a>
        </p>
    </div>
</nav>

<div class="container-fluid" style="max-width: 900px;">
    <h3 th:text="${formTitle}">表单</h3>

    <form th:action="@{/uav}" th:object="${uavForm}" method="post" class="form-horizontal" th:unless="${editMode}">
        <div class="form-group" th:classappend="${#fields.hasErrors('code')} ? 'has-error'">
            <label class="col-sm-3 control-label">编号 *</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{code}" maxlength="64"/>
                <span class="help-block" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">错误</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('model')} ? 'has-error'">
            <label class="col-sm-3 control-label">型号</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{model}" maxlength="128"/>
                <span class="help-block" th:if="${#fields.hasErrors('model')}" th:errors="*{model}">错误</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('manufacturer')} ? 'has-error'">
            <label class="col-sm-3 control-label">厂商</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{manufacturer}" maxlength="128"/>
                <span class="help-block" th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}">错误</span>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大续航(分钟)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxFlightTimeMinutes}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大航程(km)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxRangeKm}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">载重(kg)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{payloadKg}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大飞行高度(米)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxAltitudeMeters}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大飞行速度(km/h)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxSpeedKmh}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">电池容量(mAh)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{batteryCapacityMah}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">机身重量(kg)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" step="0.01" th:field="*{weightKg}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">摄像头分辨率</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{cameraResolution}" maxlength="64"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">GPS功能</label>
            <div class="col-sm-9">
                <label class="checkbox-inline">
                    <input type="checkbox" th:field="*{hasGps}"/> 有
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">避障功能</label>
            <div class="col-sm-9">
                <label class="checkbox-inline">
                    <input type="checkbox" th:field="*{hasObstacleAvoidance}"/> 有
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">购买日期</label>
            <div class="col-sm-9">
                <input class="form-control" type="date" th:field="*{purchaseDate}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">保修到期日期</label>
            <div class="col-sm-9">
                <input class="form-control" type="date" th:field="*{warrantyExpireDate}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">序列号</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{serialNumber}" maxlength="128"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">所属部门</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{department}" maxlength="128"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">应用领域</label>
            <div class="col-sm-9">
                <select class="form-control" th:field="*{applicationField}">
                    <option value="">请选择</option>
                    <option value="农业">农业</option>
                    <option value="测绘">测绘</option>
                    <option value="安防">安防</option>
                    <option value="物流">物流</option>
                    <option value="影视">影视</option>
                    <option value="科研">科研</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('status')} ? 'has-error'">
            <label class="col-sm-3 control-label">状态 *</label>
            <div class="col-sm-9">
                <select class="form-control" th:field="*{status}">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                    <option value="MAINTENANCE">MAINTENANCE</option>
                </select>
                <span class="help-block" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">错误</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('remark')} ? 'has-error'">
            <label class="col-sm-3 control-label">备注</label>
            <div class="col-sm-9">
                <textarea class="form-control" rows="3" th:field="*{remark}" maxlength="512"></textarea>
                <span class="help-block" th:if="${#fields.hasErrors('remark')}" th:errors="*{remark}">错误</span>
            </div>
        </div>

        <div class="form-group">
            <div class="col-sm-offset-3 col-sm-9">
                <button type="submit" class="btn btn-primary">保存</button>
                <a class="btn btn-default" th:href="@{/uav}">返回</a>
            </div>
        </div>
    </form>

    <form th:action="@{/uav/update}" th:object="${uavForm}" method="post" class="form-horizontal" th:if="${editMode}">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-group" th:classappend="${#fields.hasErrors('code')} ? 'has-error'">
            <label class="col-sm-3 control-label">编号 *</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{code}" maxlength="64"/>
                <span class="help-block" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">错误</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('model')} ? 'has-error'">
            <label class="col-sm-3 control-label">型号</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{model}" maxlength="128"/>
                <span class="help-block" th:if="${#fields.hasErrors('model')}" th:errors="*{model}">错误</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('manufacturer')} ? 'has-error'">
            <label class="col-sm-3 control-label">厂商</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{manufacturer}" maxlength="128"/>
                <span class="help-block" th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}">错误</span>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大续航(分钟)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxFlightTimeMinutes}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大航程(km)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxRangeKm}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">载重(kg)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{payloadKg}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大飞行高度(米)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxAltitudeMeters}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">最大飞行速度(km/h)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{maxSpeedKmh}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">电池容量(mAh)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" th:field="*{batteryCapacityMah}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">机身重量(kg)</label>
            <div class="col-sm-9">
                <input class="form-control" type="number" step="0.01" th:field="*{weightKg}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">摄像头分辨率</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{cameraResolution}" maxlength="64"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">GPS功能</label>
            <div class="col-sm-9">
                <label class="checkbox-inline">
                    <input type="checkbox" th:field="*{hasGps}"/> 有
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">避障功能</label>
            <div class="col-sm-9">
                <label class="checkbox-inline">
                    <input type="checkbox" th:field="*{hasObstacleAvoidance}"/> 有
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">购买日期</label>
            <div class="col-sm-9">
                <input class="form-control" type="date" th:field="*{purchaseDate}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">保修到期日期</label>
            <div class="col-sm-9">
                <input class="form-control" type="date" th:field="*{warrantyExpireDate}"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">序列号</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{serialNumber}" maxlength="128"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">所属部门</label>
            <div class="col-sm-9">
                <input class="form-control" th:field="*{department}" maxlength="128"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">应用领域</label>
            <div class="col-sm-9">
                <select class="form-control" th:field="*{applicationField}">
                    <option value="">请选择</option>
                    <option value="农业">农业</option>
                    <option value="测绘">测绘</option>
                    <option value="安防">安防</option>
                    <option value="物流">物流</option>
                    <option value="影视">影视</option>
                    <option value="科研">科研</option>
                    <option value="其他">其他</option>
                </select>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('status')} ? 'has-error'">
            <label class="col-sm-3 control-label">状态 *</label>
            <div class="col-sm-9">
                <select class="form-control" th:field="*{status}">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                    <option value="MAINTENANCE">MAINTENANCE</option>
                </select>
                <span class="help-block" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">错误</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${#fields.hasErrors('remark')} ? 'has-error'">
            <label class="col-sm-3 control-label">备注</label>
            <div class="col-sm-9">
                <textarea class="form-control" rows="3" th:field="*{remark}" maxlength="512"></textarea>
                <span class="help-block" th:if="${#fields.hasErrors('remark')}" th:errors="*{remark}">错误</span>
            </div>
        </div>

        <div class="form-group">
            <div class="col-sm-offset-3 col-sm-9">
                <button type="submit" class="btn btn-primary">保存</button>
                <a class="btn btn-default" th:href="@{/uav}">返回</a>
            </div>
        </div>
    </form>
</div>

<script th:src="@{/webjars/jquery/1.12.4/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/3.3.7/js/bootstrap.min.js}"></script>
</body>
</html>
