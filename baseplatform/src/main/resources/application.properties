# =============================================================================
# 无人机信息管理系统配置文件
# 技术栈：Spring Boot 2.2.x + MyBatis + Druid + SQLite/MySQL
# =============================================================================

# ------------------------------ 服务器配置 ------------------------------
# 服务器端口，设置为8086（避免端口冲突）
server.port=8086

# ------------------------------ Spring配置 ------------------------------
# 应用名称
spring.application.name=drone-management-system

# ------------------------------ 数据源配置 ------------------------------
# 默认使用SQLite配置（通过spring.profiles.active切换）
spring.profiles.active=sqlite

# ------------------------------ MyBatis配置 ------------------------------
# MyBatis配置文件路径（可省略，由Spring Boot自动配置）
# mybatis.config-location=classpath:mybatis/mybatis-config.xml

# MyBatis Mapper XML文件位置
mybatis.mapper-locations=classpath:mapper/*.xml

# MyBatis类型别名包扫描路径
mybatis.type-aliases-package=com.md.basePlatform.entity

# ------------------------------ 数据源配置 ------------------------------
# 使用Spring Boot默认数据源配置，移除Druid以避免兼容性问题

# ------------------------------ 日志配置 ------------------------------
# 日志级别配置
logging.level.com.md.basePlatform=DEBUG
logging.level.com.md.basePlatform.mapper=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.com.md.basePlatform.controller=DEBUG
logging.level.com.md.basePlatform.service=DEBUG
logging.level.com.md.basePlatform.mapper=DEBUG

# ------------------------------ SQLite配置（默认） ------------------------------
# 激活SQLite配置文件
spring.profiles.include=sqlite

# SQLite数据库文件路径（相对路径，数据库文件会自动创建）
spring.datasource.url=jdbc:sqlite:./data/example_db.db

# SQLite数据库用户名（SQLite不需要用户名，此处留空）
spring.datasource.username=

# SQLite数据库密码（SQLite不需要密码，此处留空）
spring.datasource.password=

# SQLite JDBC驱动类名
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite方言（MyBatis使用）
mybatis.configuration.database-id=sqlite

# 数据库初始化配置
spring.datasource.schema=classpath:schema.sql
spring.datasource.initialization-mode=always

# ------------------------------ MySQL配置（可选） ------------------------------
# 如需切换到MySQL，请将spring.profiles.active设置为mysql
# 并取消下方配置的注释

# spring.profiles.active=mysql

# # MySQL数据库连接URL
# spring.datasource.url=jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true

# # MySQL数据库用户名
# spring.datasource.username=root

# # MySQL数据库密码
# spring.datasource.password=123456

# # MySQL JDBC驱动类名
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# # MySQL方言（MyBatis使用）
# mybatis.configuration.database-id=mysql