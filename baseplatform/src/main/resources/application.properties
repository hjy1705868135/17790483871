spring.application.name=basePlatform

server.port=8088

# =========================================================
# DB switch: sqlite (default) / mysql
# =========================================================
app.db.type=sqlite

# ---- SQLite ----
app.db.sqlite.driverClassName=org.sqlite.JDBC
app.db.sqlite.url=jdbc:sqlite:./data/cupro.db
app.db.sqlite.username=
app.db.sqlite.password=

# ---- MySQL ----
app.db.mysql.driverClassName=com.mysql.cj.jdbc.Driver
app.db.mysql.url=jdbc:mysql://localhost:3306/cupro?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
app.db.mysql.username=root
app.db.mysql.password=123456

# SQL init
spring.datasource.schema=classpath:db/schema-sqlite.sql

# Druid base
spring.datasource.druid.initial-size=1
spring.datasource.druid.min-idle=1
spring.datasource.druid.max-active=10
spring.datasource.druid.max-wait=60000
spring.datasource.druid.validation-query=SELECT 1
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf
spring.thymeleaf.cache=false
