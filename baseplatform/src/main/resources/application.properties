spring.application.name=basePlatform

# Server Configuration
server.port=8081

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:ecommerce.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite 初始化 - 每次启动自动建表和数据
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-sqlite.sql
spring.sql.init.continue-on-error=true

# Alternative Database Configuration (MySQL)
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus Configuration
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml
mybatis-plus.type-aliases-package=com.md.basePlatform.domain
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-handlers-package=com.md.basePlatform.config
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# JWT Configuration
# 生产环境请通过环境变量 JWT_SECRET 设置，至少 256 bits (32 bytes)
jwt.secret=${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-please-change-this-in-production}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# Logging Configuration
logging.level.com.md.basePlatform=DEBUG
logging.level.org.springframework.security=DEBUG
